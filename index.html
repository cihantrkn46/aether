<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aether" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="Aether — Canlı sesli çeviri ve kamera ile metin tanıma (OCR) desteğiyle çok dilli çeviri asistanı." />
    <meta property="og:title" content="Aether — Canlı Çeviri" />
    <meta property="og:description" content="Canlı sesli çeviri ve kamera OCR desteğiyle çok dilli çeviri asistanı." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <title>Aether — Canlı Çeviri</title>
    <link rel="icon" href="icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0B0B0F" id="theme-color-meta" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=3.4" />
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('aether_theme');
                var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {}
        })();
    </script>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <canvas id="wave-canvas"></canvas>

    <div class="app">
        <!-- HEADER -->
        <header class="header">
            <div class="brand">
                <div class="brand-icon">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <line x1="12" y1="19" x2="12" y2="22" />
                        <line x1="8" y1="22" x2="16" y2="22" />
                    </svg>
                </div>
                <div class="brand-text">
                    <h1 class="brand-title">Aether</h1>
                    <span class="brand-sub">Live Translate
                        <span class="brand-eq" aria-hidden="true"><span></span><span></span><span></span><span></span></span>
                    </span>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn btn-modern btn-history" aria-label="Geçmiş" id="btn-history-header">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10" />
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
                    </svg>
                </button>
                <button class="icon-btn btn-modern btn-camera" aria-label="Kamera ile Çevir" id="btn-camera-header">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                </button>
                <button class="icon-btn btn-modern" aria-label="Tema Değiştir" id="btn-theme-toggle">
                    <svg class="icon icon-theme-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                    <svg class="icon icon-theme-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                </button>
                <button class="icon-btn btn-modern btn-settings" aria-label="Ayarlar" id="btn-settings-header">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- PWA BANNER -->
        <div id="pwa-install-banner" class="pwa-banner hidden">
            <div class="pwa-content">
                <span class="pwa-icon">📲</span>
                <span class="pwa-text">Aether'i ana ekrana ekle</span>
            </div>
            <div class="pwa-actions">
                <button id="btn-install-pwa" class="pwa-install-btn">Ekle</button>
                <button id="btn-dismiss-pwa" class="pwa-dismiss-btn">×</button>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <main class="content">
            <!-- Live Mode Bar -->
            <div class="live-mode-bar">
                <div class="live-mode-info">
                    <span class="live-mode-dot" id="live-dot"></span>
                    <span class="live-mode-label">Canlı Konuşma</span>
                </div>
                <div class="live-mode-extras">
                    <span class="interpreter-badge hidden" id="interpreter-badge">Tercüman</span>
                    <button class="live-toggle" id="live-toggle" aria-label="Canlı Konuşma Modu">
                        <div class="live-toggle-track" id="live-track">
                            <div class="live-toggle-thumb"></div>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Source Card -->
            <div class="card card-source" id="card-source">
                <div class="card-glow"></div>
                <div class="card-top">
                    <button class="lang-badge btn-modern" id="badge-source" aria-label="Kaynak Dili Değiştir">
                        <span class="flag" id="flag-source">🇹🇷</span>
                        <div class="lang-info">
                            <span class="lang-label" id="label-source">KAYNAK</span>
                            <span class="lang-name" id="name-source">Türkçe</span>
                        </div>
                        <svg class="icon chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9" /></svg>
                    </button>
                    <div class="card-actions">
                        <button class="act-btn btn-modern btn-speak-source" aria-label="Seslendir">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M11 5L6 9H2v6h4l5 4V5z" />
                                <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                                <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                            </svg>
                        </button>
                        <button class="act-btn btn-modern btn-camera-card" aria-label="Kamera ile Çevir">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                                <circle cx="12" cy="13" r="4" />
                            </svg>
                        </button>
                        <button class="act-btn btn-modern btn-clear" aria-label="Temizle">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 6h18" />
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <textarea id="text-source" dir="auto" placeholder="Yazmaya başlayın…" maxlength="5000"></textarea>
                    <div class="card-meta">
                        <span class="live-indicator hidden" id="live-indicator">
                            <span class="live-dot"></span>
                            <span class="live-text">Dinleniyor</span>
                        </span>
                        <span class="char-counter" id="char-count">0 / 5000</span>
                    </div>
                    <div class="loader hidden" id="loader-source"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Swap -->
            <div class="swap-area">
                <div class="swap-line"></div>
                <button class="swap-btn btn-modern" aria-label="Dilleri Değiştir">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 16V4M7 4L3 8M7 4l4 4" />
                        <path d="M17 8v12m0 0l4-4m-4 4l-4-4" />
                    </svg>
                </button>
                <div class="swap-line"></div>
            </div>

            <!-- Target Card -->
            <div class="card card-target" id="card-target">
                <div class="card-glow"></div>
                <div class="card-top">
                    <button class="lang-badge btn-modern" id="badge-target" aria-label="Hedef Dili Değiştir">
                        <span class="flag" id="flag-target">🇺🇸</span>
                        <div class="lang-info">
                            <span class="lang-label" id="label-target">HEDEF</span>
                            <span class="lang-name" id="name-target">İngilizce</span>
                        </div>
                        <svg class="icon chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9" /></svg>
                    </button>
                    <div class="card-actions">
                        <button class="act-btn btn-modern btn-star" aria-label="Favorilere Ekle" id="btn-star">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                            </svg>
                        </button>
                        <button class="act-btn btn-modern btn-share" aria-label="Paylaş">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="18" cy="5" r="3" />
                                <circle cx="6" cy="12" r="3" />
                                <circle cx="18" cy="19" r="3" />
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                            </svg>
                        </button>
                        <button class="act-btn btn-modern btn-speak-target" aria-label="Seslendir">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M11 5L6 9H2v6h4l5 4V5z" />
                                <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                                <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                            </svg>
                        </button>
                        <button class="act-btn btn-modern btn-copy" aria-label="Kopyala">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" />
                                <path d="M5 15V5a2 2 0 0 1 2-2h10" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="card-body" aria-live="polite">
                    <textarea id="text-target" dir="auto" placeholder="Çeviri burada belirecek…" readonly></textarea>
                    <div class="card-meta">
                        <span class="typing-indicator hidden" id="typing-indicator">
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                        </span>
                    </div>
                    <div class="loader hidden" id="loader-target"><div class="spinner"></div></div>
                </div>
                <!-- Çeviri Kaynağı Rozeti -->
                <div class="translation-badge hidden" id="translation-badge">
                    <span class="badge-icon" id="badge-icon">⚡</span>
                    <span class="badge-text" id="badge-text">Anlık Çeviri</span>
                </div>
                <!-- Alternatif Çeviriler -->
                <div class="alternatives hidden" id="alternatives-box">
                    <div class="alternatives-header">Diğer Anlamlar</div>
                    <div class="alternatives-list" id="alternatives-list"></div>
                </div>
            </div>
        </main>

        <!-- FOOTER / MIC BUTTONS -->
        <footer class="footer">
            <button class="mic-btn btn-modern" id="btn-source" aria-label="Kaynak Dilde Konuş">
                <div class="mic-inner">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <line x1="12" y1="19" x2="12" y2="23" />
                        <line x1="8" y1="23" x2="16" y2="23" />
                    </svg>
                </div>
                <span class="mic-label" id="mic-label-source">TR</span>
                <!-- Dalga ripple -->
                <span class="mic-wave"></span>
            </button>

            <button class="mic-btn btn-modern" id="btn-target" aria-label="Hedef Dilde Konuş">
                <div class="mic-inner">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <line x1="12" y1="19" x2="12" y2="23" />
                        <line x1="8" y1="23" x2="16" y2="23" />
                    </svg>
                </div>
                <span class="mic-label" id="mic-label-target">EN</span>
                <span class="mic-wave"></span>
            </button>
        </footer>

        <div class="signature-wrap">
            <div class="signature-line"></div>
            <span class="mct-signature">MCT Yazılım</span>
            <div class="signature-line"></div>
        </div>

        <!-- SETTINGS MODAL -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-panel">
                <div class="panel-header">
                    <h3 id="modal-title">Dil Seçimi</h3>
                    <button class="done-btn btn-modern" id="settings-done">Bitti</button>
                </div>
                <div class="settings-group" id="speed-section">
                    <h4>Ses Hızı</h4>
                    <div class="speed-row">
                        <button class="speed-opt btn-modern" data-speed="0.7">Yavaş</button>
                        <button class="speed-opt btn-modern active" data-speed="1.0">Normal</button>
                        <button class="speed-opt btn-modern" data-speed="1.3">Hızlı</button>
                    </div>
                </div>
                <div class="settings-group" id="font-section">
                    <h4>Metin Boyutu</h4>
                    <div class="font-slider-row">
                        <span class="font-slider-label">A</span>
                        <input type="range" class="font-slider" id="font-slider" min="12" max="24" value="16" />
                        <span class="font-slider-label" style="font-size:18px">A</span>
                    </div>
                </div>
                <div class="settings-group lang-group">
                    <div class="lang-search-row">
                        <h4>Diller</h4>
                        <div class="search-input-wrap">
                            <svg class="icon search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8" />
                                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                            </svg>
                            <input type="text" id="lang-search" placeholder="Dil ara…" inputmode="search" autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="search" />
                        </div>
                    </div>
                    <div class="panel-body" id="lang-list"></div>
                </div>
            </div>
        </div>

        <!-- HISTORY MODAL -->
        <div id="history-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-panel">
                <div class="panel-header">
                    <h3>Çeviri Geçmişi</h3>
                    <div class="panel-header-actions">
                        <button class="act-btn btn-modern btn-clear-history" id="btn-clear-history" aria-label="Tümünü Sil">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 6h18" />
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                            </svg>
                        </button>
                        <button class="done-btn btn-modern" id="history-done">Kapat</button>
                    </div>
                </div>
                <div class="lang-search-row" style="padding:0 24px 12px">
                    <div class="search-input-wrap" style="flex:1; min-width:0;">
                        <svg class="icon search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" id="history-search" placeholder="Geçmişte ara…" inputmode="search" autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="search" />
                    </div>
                    <button class="act-btn btn-modern btn-star" id="btn-history-favorites-filter" aria-label="Yalnızca Favoriler" style="margin-left:8px">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                        </svg>
                    </button>
                </div>
                <div class="panel-body history-body" id="history-list">
                    <div class="history-empty">Henüz çeviri geçmişi yok.</div>
                </div>
            </div>
        </div>

        <!-- CAMERA MODAL -->
        <div id="camera-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-panel camera-panel">
                <div class="panel-header">
                    <h3>Kamera ile Çevir</h3>
                    <button class="done-btn btn-modern" id="camera-done">Kapat</button>
                </div>
                <div class="camera-body">
                    <div class="camera-preview-wrap">
                        <video id="camera-video" autoplay playsinline muted></video>
                        <canvas id="camera-canvas" style="display:none;"></canvas>
                        <div class="camera-overlay">
                            <div class="camera-frame">
                                <span class="camera-corner tl"></span>
                                <span class="camera-corner tr"></span>
                                <span class="camera-corner bl"></span>
                                <span class="camera-corner br"></span>
                            </div>
                            <p class="camera-hint">Metni çerçeveye hizalayın</p>
                        </div>
                        <div class="camera-loader hidden" id="camera-loader">
                            <div class="spinner"></div>
                            <span>Metin okunuyor…</span>
                        </div>
                        <div class="camera-translation hidden" id="camera-translation">
                            <div class="camera-original" id="camera-original-text"></div>
                            <div class="camera-translated" id="camera-translated-text"></div>
                        </div>
                    </div>
                    <div class="camera-toolbar">
                        <label class="camera-toggle-row">
                            <span class="camera-toggle-label">Sürekli Tarama</span>
                            <button class="live-toggle" id="camera-continuous-toggle" aria-label="Sürekli Tarama">
                                <div class="live-toggle-track" id="camera-toggle-track">
                                    <div class="live-toggle-thumb"></div>
                                </div>
                            </button>
                        </label>
                    </div>
                    <div class="camera-actions">
                        <button class="camera-capture-btn btn-modern" id="btn-capture">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10" />
                                <circle cx="12" cy="12" r="3" fill="currentColor" />
                            </svg>
                            <span>Çek ve Çevir</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
    <script src="script.js?v=3.4"></script>
